spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gigmanager
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration: 900000
    refresh-token-expiration: 2592000000
  apple:
    bundle-id: ${APPLE_BUNDLE_ID}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
